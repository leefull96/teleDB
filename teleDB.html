<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원 DB 관리 시스템</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 20px; background-color: #f4f7f6; }
        h2 { color: #333; }
        .controls { margin-bottom: 20px; background: #fff; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        textarea { width: 100%; height: 100px; margin-bottom: 10px; padding: 10px; box-sizing: border-box; }
        button { padding: 8px 15px; cursor: pointer; background-color: #0056b3; color: white; border: none; border-radius: 4px; }
        button:hover { background-color: #004494; }
        table { width: 100%; border-collapse: collapse; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #e9ecef; cursor: pointer; position: relative; }
        th:hover { background-color: #d6d8db; }
        .kick-alert { color: white; background-color: #dc3545; font-weight: bold; padding: 5px; border-radius: 4px; display: inline-block; margin-top: 3px; }
        input[type="text"], input[type="date"], input[type="number"], select { padding: 4px; box-sizing: border-box; }
        .edit-room-container { display: flex; flex-direction: column; gap: 8px; align-items: center; }
        .room-edit-row { display: flex; gap: 5px; align-items: center; background: #f8f9fa; padding: 5px; border-radius: 4px; }
        .room-text { text-align: left; line-height: 1.5; }
    </style>
</head>
<body>

    <h2>👥 VIP 회원 관리 시스템</h2>

    <div class="controls">
        <h3>일괄 추가 (엑셀에서 복사 후 붙여넣기)</h3>
        <p>형식: 번호 [탭] 이름 [탭] 전화번호 [탭] 접속경로 [탭] 유료접속방(예: - VIP실버 (2026-02-23~2026-03-30) - VIP골드 (2026-04-01~2026-05-01))</p>
        <textarea id="bulkData" placeholder="엑셀 데이터를 붙여넣으세요..."></textarea><br>
        <button id="addBulkBtn">데이터 일괄 추가</button>
    </div>

    <table id="dataTable">
        <thead>
            <tr>
                <th onclick="sortTable('id')">번호 ↕</th>
                <th onclick="sortTable('name')">이름 ↕</th>
                <th onclick="sortTable('phone')">전화번호 ↕</th>
                <th onclick="sortTable('path')">접속경로 ↕</th>
                <th onclick="sortTable('room')">유료접속방(유료회원) ↕</th>
                <th onclick="sortTable('voucher')">무료 바우처 기간 ↕</th>
                <th onclick="sortTable('finalDate')">최종 계약 만료 날짜 ↕</th>
                <th onclick="sortTable('kick')">텔레그램 추방 여부 확인 ↕</th>
            </tr>
        </thead>
        <tbody id="tableBody">
        </tbody>
    </table>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
        import { getFirestore, collection, getDocs, updateDoc, doc, writeBatch } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBkdZkr8E9di03l6nDNNssbwAKMlCFlXN4",
            authDomain: "fuinv-teledb.firebaseapp.com",
            projectId: "fuinv-teledb",
            storageBucket: "fuinv-teledb.firebasestorage.app",
            messagingSenderId: "975319017229",
            appId: "1:975319017229:web:ee86df8938537c08f5f244"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const membersCol = collection(db, "members");

        let currentData = [];
        let sortCol = '';
        let sortAsc = true;

        // 1. 데이터 불러오기
        async function loadData() {
            try {
                const snapshot = await getDocs(membersCol);
                currentData = snapshot.docs.map(doc => ({ docId: doc.id, ...doc.data() }));
                renderTable();
            } catch (error) {
                console.error("데이터 로드 오류:", error);
                alert("데이터를 불러오는 중 오류가 발생했습니다. 권한 설정(Rules)을 확인해주세요.");
            }
        }

        // 2. 날짜 계산 로직 (가장 늦은 방의 만료일 + 바우처 적용)
        function calculateFinalDate(rooms, voucherStr) {
            if (!rooms || rooms.length === 0) return null;
            
            // 보유한 방 중 가장 늦은 종료일 찾기
            let latestDate = null;
            rooms.forEach(r => {
                if (r.endDate) {
                    let d = new Date(r.endDate);
                    if (!latestDate || d > latestDate) latestDate = d;
                }
            });

            if (!latestDate) return null;

            let finalDate = new Date(latestDate);
            if (voucherStr) {
                let num = parseInt(voucherStr.replace(/[^0-9]/g, '')) || 0;
                if (voucherStr.includes('개월')) finalDate.setDate(finalDate.getDate() + (num * 30));
                else if (voucherStr.includes('주')) finalDate.setDate(finalDate.getDate() + (num * 7));
                else if (voucherStr.includes('일')) finalDate.setDate(finalDate.getDate() + num);
            }
            return finalDate;
        }

        function formatDate(date) {
            if (!date) return '';
            const yyyy = date.getFullYear();
            const mm = String(date.getMonth() + 1).padStart(2, '0');
            const dd = String(date.getDate()).padStart(2, '0');
            return `${yyyy}-${mm}-${dd}`;
        }

        // 구버전 데이터(단일 방)를 신버전 배열(rooms)로 정규화하는 유틸
        function normalizeRooms(item) {
            if (item.rooms && Array.isArray(item.rooms)) return item.rooms;
            if (item.roomType) return [{ roomType: item.roomType, startDate: item.startDate, endDate: item.endDate }];
            return [];
        }

        // 3. 테이블 렌더링
        window.renderTable = function() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            let today = new Date();
            today.setHours(0, 0, 0, 0);

            currentData.forEach(item => {
                const tr = document.createElement('tr');
                
                let rooms = normalizeRooms(item);
                let finalDate = calculateFinalDate(rooms, item.voucher);
                let finalDateStr = formatDate(finalDate);
                
                let kickStatus = "";
                if (finalDate && finalDate < today) {
                    kickStatus = "<span class='kick-alert'>계약 만료<br>추방 필요</span>";
                }

                // 유료접속방 문자열 조합 (줄바꿈 처리)
                let roomString = rooms.map(r => `- ${r.roomType} (${r.startDate}~${r.endDate})`).join('<br>');

                tr.innerHTML = `
                    <td ondblclick="editCell('${item.docId}', 'id', '${item.id || ''}')">${item.id || ''}</td>
                    <td ondblclick="editCell('${item.docId}', 'name', '${item.name || ''}')">${item.name || ''}</td>
                    <td ondblclick="editCell('${item.docId}', 'phone', '${item.phone || ''}')">${item.phone || ''}</td>
                    <td ondblclick="editCell('${item.docId}', 'path', '${item.path || ''}')">${item.path || ''}</td>
                    <td class="room-text" ondblclick="editRoomCell('${item.docId}')">${roomString}</td>
                    <td ondblclick="editVoucherCell('${item.docId}', '${item.voucher || ''}')">${item.voucher || ''}</td>
                    <td style="font-weight:bold; color:#0056b3;">${finalDateStr}</td>
                    <td>${kickStatus}</td>
                `;
                tbody.appendChild(tr);
            });
        };

        // 4. 일반 셀 인라인 수정
        window.editCell = function(docId, field, value) {
            const new_value = prompt("수정할 값을 입력하세요:", value === 'undefined' ? '' : value);
            if (new_value !== null && new_value !== value) {
                updateData(docId, { [field]: new_value });
            }
        };

        // 4-1. 무료 바우처 전용 인라인 수정 (숫자 + 일/주/개월)
        window.editVoucherCell = function(docId, currentVoucher) {
            const tr = event.target.closest('td');
            
            let num = currentVoucher.replace(/[^0-9]/g, '') || '';
            let unit = '일';
            if (currentVoucher.includes('주')) unit = '주';
            if (currentVoucher.includes('개월')) unit = '개월';

            tr.innerHTML = `
                <div style="display:flex; gap:5px; align-items:center; justify-content:center;">
                    <input type="number" id="vNum_${docId}" value="${num}" style="width:50px;">
                    <select id="vUnit_${docId}">
                        <option value="일" ${unit==='일'?'selected':''}>일</option>
                        <option value="주" ${unit==='주'?'selected':''}>주</option>
                        <option value="개월" ${unit==='개월'?'selected':''}>개월</option>
                    </select>
                </div>
                <div style="margin-top:5px;">
                    <button onclick="saveVoucher('${docId}')" style="font-size:12px; padding:3px 8px;">저장</button>
                    <button onclick="renderTable()" style="font-size:12px; padding:3px 8px; background-color:#6c757d;">취소</button>
                </div>
            `;
            tr.removeAttribute("ondblclick");
        };

        window.saveVoucher = async function(docId) {
            const num = document.getElementById(`vNum_${docId}`).value;
            const unit = document.getElementById(`vUnit_${docId}`).value;
            let val = num ? `${num}${unit}` : '';
            await updateData(docId, { voucher: val });
        };

        // 5. 유료접속방 다중 수정 및 추가 로직
        window.editRoomCell = function(docId) {
            const item = currentData.find(d => d.docId === docId);
            let rooms = normalizeRooms(item);
            if (rooms.length === 0) rooms.push({roomType: 'VIP실버', startDate: '', endDate: ''}); // 기본 빈칸 하나 생성

            const tr = event.target.closest('td');
            
            let roomRowsHtml = rooms.map((r, idx) => createRoomRowHtml(r.roomType, r.startDate, r.endDate)).join('');

            tr.innerHTML = `
                <div class="edit-room-container" id="roomContainer_${docId}">
                    ${roomRowsHtml}
                    <div style="margin-top: 5px; display:flex; gap:5px;">
                        <button onclick="addRoomRow('${docId}')" style="font-size:12px; padding:4px 10px; background-color:#28a745;">방 추가 ➕</button>
                        <button onclick="saveRoom('${docId}')" style="font-size:12px; padding:4px 10px;">저장</button>
                        <button onclick="renderTable()" style="font-size:12px; padding:4px 10px; background-color:#6c757d;">취소</button>
                    </div>
                </div>
            `;
            tr.removeAttribute("ondblclick");
        };

        function createRoomRowHtml(type = 'VIP실버', start = '', end = '') {
            return `
                <div class="room-edit-row">
                    <select class="selType">
                        <option value="VIP실버" ${type==='VIP실버'?'selected':''}>VIP실버</option>
                        <option value="VIP골드" ${type==='VIP골드'?'selected':''}>VIP골드</option>
                        <option value="VIP다이아몬드" ${type==='VIP다이아몬드'?'selected':''}>VIP다이아몬드</option>
                        <option value="Value-Up" ${type==='Value-Up'?'selected':''}>Value-Up</option>
                    </select>
                    <input type="date" class="selStart" value="${start}"> ~ 
                    <input type="date" class="selEnd" value="${end}">
                    <button onclick="this.parentElement.remove()" style="font-size:10px; padding:3px 5px; background-color:#dc3545;">X</button>
                </div>
            `;
        }

        window.addRoomRow = function(docId) {
            const container = document.getElementById(`roomContainer_${docId}`);
            const btnDiv = container.lastElementChild;
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = createRoomRowHtml();
            container.insertBefore(tempDiv.firstElementChild, btnDiv);
        };

        window.saveRoom = async function(docId) {
            const container = document.getElementById(`roomContainer_${docId}`);
            const rows = container.querySelectorAll('.room-edit-row');
            let newRooms = [];
            
            rows.forEach(row => {
                newRooms.push({
                    roomType: row.querySelector('.selType').value,
                    startDate: row.querySelector('.selStart').value,
                    endDate: row.querySelector('.selEnd').value
                });
            });
            
            await updateData(docId, { rooms: newRooms });
        };

        // 6. DB 업데이트 로직
        window.updateData = async function(docId, updateObj) {
            try {
                const docRef = doc(db, "members", docId);
                await updateDoc(docRef, updateObj);
                
                // 로컬 배열 업데이트
                let index = currentData.findIndex(d => d.docId === docId);
                if (index > -1) {
                    currentData[index] = { ...currentData[index], ...updateObj };
                }
                renderTable();
            } catch (e) {
                alert("수정 실패: " + e.message);
                console.error(e);
            }
        };

        // 7. 정렬 기능
        window.sortTable = function(column) {
            sortAsc = sortCol === column ? !sortAsc : true;
            sortCol = column;

            currentData.sort((a, b) => {
                let valA = a[column] || '';
                let valB = b[column] || '';

                if (column === 'id') {
                    valA = parseInt(valA) || 0;
                    valB = parseInt(valB) || 0;
                }
                
                // 새로운 최종 날짜 또는 추방 여부 정렬 기준
                if (column === 'kick' || column === 'finalDate') {
                    valA = calculateFinalDate(normalizeRooms(a), a.voucher) || new Date(0);
                    valB = calculateFinalDate(normalizeRooms(b), b.voucher) || new Date(0);
                }

                if (valA < valB) return sortAsc ? -1 : 1;
                if (valA > valB) return sortAsc ? 1 : -1;
                return 0;
            });
            renderTable();
        };

        // 8. 엑셀 데이터 일괄 추가 (복수 방 정규식 파싱)
        document.getElementById('addBulkBtn').addEventListener('click', async () => {
            const text = document.getElementById('bulkData').value.trim();
            if (!text) return alert("데이터를 입력하세요.");

            const lines = text.split('\n');
            const batch = writeBatch(db);

            lines.forEach(line => {
                const parts = line.split('\t'); 
                if (parts.length < 5) return; 

                const [id, name, phone, path, roomRaw] = parts;
                
                // 방 정보 복수 추출 정규식
                const roomRegex = /-\s*(VIP실버|VIP골드|VIP다이아몬드|Value-Up)\s*\((.*?)\~(.*?)\)/g;
                let match;
                let parsedRooms = [];
                
                while ((match = roomRegex.exec(roomRaw)) !== null) {
                    parsedRooms.push({
                        roomType: match[1],
                        startDate: match[2].trim(),
                        endDate: match[3].trim()
                    });
                }

                const newDocRef = doc(collection(db, "members"));
                batch.set(newDocRef, {
                    id: id.trim(),
                    name: name.trim(),
                    phone: phone.trim(),
                    path: path.trim(),
                    rooms: parsedRooms, // 배열로 저장
                    voucher: '' 
                });
            });

            try {
                await batch.commit();
                alert("일괄 추가가 완료되었습니다!");
                document.getElementById('bulkData').value = '';
                loadData();
            } catch (e) {
                alert("추가 중 오류 발생: " + e.message + "\nFirestore 규칙(Rules)이 쓰기를 허용하는지 확인하세요.");
                console.error(e);
            }
        });

        // 초기 데이터 로드
        loadData();
    </script>
</body>
</html>
